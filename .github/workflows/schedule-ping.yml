
on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:


jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Print time
        run: |
          echo "Schedule ping triggered"
          echo "UTC time:"
          date -u
          echo "Local runner time:"
          date
