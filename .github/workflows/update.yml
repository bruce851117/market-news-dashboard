name: Update Market News

on:
  schedule:
    - cron: "0 23 * * *"   # 台灣時間每天早上 07:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 google-genai
          playwright install --with-deps chromium

      - name: Crawl WallstreetCN
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/crawler.py

      - name: Upload raw news artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-news
          path: data/raw_news.json

      - name: Summarize with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/summarize.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/news.json data/raw_news.json
          git commit -m "update market news" || echo "No changes to commit"
          git push
